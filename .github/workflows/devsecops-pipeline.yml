name: DevSecOps Pipeline (Local / Docker Hub)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: devsecops-app
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 0: Preflight — verify secrets before anything runs
  # ──────────────────────────────────────────────────────
  preflight:
    name: Preflight — Check Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets are configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$DOCKERHUB_USERNAME" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "$DOCKERHUB_TOKEN" ]]    && missing+=("DOCKERHUB_TOKEN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Fix: Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "  DOCKERHUB_USERNAME — your Docker Hub username (e.g. jakeoni25)"
            echo "  DOCKERHUB_TOKEN    — Docker Hub access token (not your password)"
            exit 1
          fi
          echo "All required secrets are present."

  # ──────────────────────────────────────────────────────
  # JOB 1: Scan Dockerfile and code for misconfigurations
  # ──────────────────────────────────────────────────────
  config-security:
    name: Config & IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Dockerfile + K8s manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,kubernetes
          output_format: cli
          output_file_path: console
          soft_fail: true

  # ──────────────────────────────────────────────────────
  # JOB 2: Static Application Security Testing
  # ──────────────────────────────────────────────────────
  sast:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and run Bandit
        run: |
          pip install bandit
          bandit -r app/ -ll -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

  # ──────────────────────────────────────────────────────
  # JOB 3: Build image and scan for CVEs with Trivy
  # ──────────────────────────────────────────────────────
  build-and-scan:
    name: Build & Scan Container (Trivy)
    runs-on: ubuntu-latest
    needs: [config-security, sast]
    outputs:
      full-image: ${{ steps.meta.outputs.full-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        id: meta
        run: |
          FULL_IMAGE=$DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker build -t $FULL_IMAGE ./app/
          docker tag $FULL_IMAGE $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
          echo "full-image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "Built: $FULL_IMAGE"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full-image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Push image to Docker Hub
        run: |
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
          echo "Pushed: $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG"

  # ──────────────────────────────────────────────────────
  # JOB 4: Validate Kubernetes manifests
  # ──────────────────────────────────────────────────────
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate manifests
        run: |
          kubeconform -strict -summary k8s/
          echo "All manifests valid."

      - name: Summary
        run: |
          echo "════════════════════════════════════════"
          echo "  Pipeline complete — image is ready"
          echo "════════════════════════════════════════"
          echo ""
          echo "  Image: $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG"
          echo ""
          echo "  Deploy locally:"
          echo "  bash scripts/deploy-local.sh"
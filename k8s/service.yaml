apiVersion: v1
kind: Service
metadata:
  name: devsecops-app-service
  labels:
    app: devsecops-app
spec:
  # NodePort instead of LoadBalancer — works on Minikube without a cloud provider
  # Access via: minikube service devsecops-app-service --url
  type: NodePort
  selector:
    app: devsecops-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
